version: 2

sources:
    - name: raw_data
      description: "Chicago traffic crashes data sourced from raw data files"
      database: "{{ env_var('PROJECT_ID') }}"
      schema: "{{ env_var('DATASET_ID') }}"
      tables:
          - name: external_crashes
            description: "Raw traffic crashes data"
            columns:
                - name: crash_record_id
                  description: This number can be used to link to the same crash in the Vehicles and People datasets. This number also serves as a unique ID in this dataset.
                - name: crash_date
                  description: Date and time of crash as entered by the reporting officer
                - name: posted_speed_limit
                  description: Posted speed limit, as determined by reporting officer
                - name: traffic_control_device
                  description: Traffic control device present at crash location, as determined by reporting officer
                - name: device_condition
                  description: Condition of traffic control device, as determined by reporting officer
                - name: weather_condition
                  description: Weather condition at time of crash, as determined by reporting officer
                - name: lighting_condition
                  description: Light condition at time of crash, as determined by reporting officer
                - name: first_crash_type
                  description: Type of first collision in crash
                - name: trafficway_type
                  description: Trafficway type, as determined by reporting officer
                - name: alignment
                  description: Street alignment at crash location, as determined by reporting officer
                - name: roadway_surface_cond
                  description: Road surface condition, as determined by reporting officer
                - name: road_defect
                  description: Road defects, as determined by reporting officer
                - name: report_type
                  description: Administrative report type (at scene, at desk, amended)
                - name: crash_type
                  description: A general severity classification for the crash. Can be either Injury and/or Tow Due to Crash or No Injury / Drive Away
                - name: damage
                  description: A field observation of estimated damage.
                - name: date_police_notified
                  description: Calendar date on which police were notified of the crash
                - name: prim_contributory_cause
                  description: The factor which was most significant in causing the crash, as determined by officer judgment
                - name: sec_contributory_cause
                  description: The factor which was second most significant in causing the crash, as determined by officer judgment
                - name: street_no
                  description: Street address number of crash location, as determined by reporting officer
                - name: street_direction
                  description: Street address direction (N,E,S,W) of crash location, as determined by reporting officer
                - name: street_name
                  description: Street address name of crash location, as determined by reporting officer
                - name: beat_of_occurrence
                  description: Chicago Police Department Beat ID. Boundaries available at https://data.cityofchicago.org/d/aerh-rz74
                - name: num_units
                  description: Number of units involved in the crash. A unit can be a motor vehicle, a pedestrian, a bicyclist, or another non-passenger roadway user. Each unit represents a mode of traffic with an independent trajectory.
                - name: most_severe_injury
                  description: Most severe injury sustained by any person involved in the crash
                - name: injuries_total
                  description: Total persons sustaining fatal, incapacitating, non-incapacitating, and possible injuries as determined by the reporting officer
                - name: injuries_fatal
                  description: Total persons sustaining fatal injuries in the crash
                - name: injuries_incapacitating
                  description: Total persons sustaining incapacitating/serious injuries in the crash as determined by the reporting officer. Any injury other than fatal injury, which prevents the injured person from walking, driving, or normally continuing the activities they were capable of performing before the injury occurred. Includes severe lacerations, broken limbs, skull or chest injuries, and abdominal injuries.
                - name: injuries_non_incapacitating
                  description: Total persons sustaining non-incapacitating injuries in the crash as determined by the reporting officer. Any injury, other than fatal or incapacitating injury, which is evident to observers at the scene of the crash. Includes lump on head, abrasions, bruises, and minor lacerations.
                - name: injuries_reported_not_evident
                  description: Total persons sustaining injuries that were reported but not evident at the scene of the crash
                - name: injuries_unknown
                  description: Total persons for whom injuries sustained, if any, are unknown
                - name: crash_hour
                  description: The hour of the day component of CRASH_DATE
                - name: crash_day_of_week
                  description: The day of the week component of CRASH_DATE. Sunday=1
                - name: crash_month
                  description: The month component of CRASH_DATE
                - name: latitude
                  description: The latitude of the crash location, as determined by reporting officer, as derived from the reported address of crash
                - name: longitude
                  description: The longitude of the crash location, as determined by reporting officer, as derived from the reported address of crash
                - name: location
                  description: The crash location, as determined by reporting officer, as derived from the reported address of crash, in a column type that allows for mapping and other geographic analysis in the data portal software
                - name: intersection_related_i
                  description: A field observation by the police officer whether an intersection played a role in the crash. Does not represent whether or not the crash occurred within the intersection.
                - name: hit_and_run_i
                  description: Crash did/did not involve a driver who caused the crash and fled the scene without exchanging information and/or rendering aid
                - name: crash_date_est_i
                  description: Crash date estimated by desk officer or reporting party (only used in cases where crash is reported at police station days after the crash)
                - name: statements_taken_i
                  description: Whether statements were taken from unit(s) involved in crash
                - name: photos_taken_i
                  description: Whether the Chicago Police Department took photos at the location of the crash
                - name: private_property_i
                  description: Whether the crash begun or first contact was made outside of the public right-of-way.
                - name: dooring_i
                  description: Whether crash involved a motor vehicle occupant opening a door into the travel path of a bicyclist, causing a crash
                - name: _dlt_load_id
                  description: Internal identifier for the data load batch.
                - name: _dlt_id
                  description: Internal unique identifier for the ingested record.
          - name: external_vehicles
            description: "Raw vehicles data"
            columns:
                - name: crash_unit_id
                  description: A unique identifier for each vehicle record.
                - name: crash_record_id
                  description: This number can be used to link to the same crash in the Crashes and People datasets. This number also serves as a unique ID in the Crashes dataset.
                - name: crash_date
                  description: Date and time of crash as entered by the reporting officer
                - name: unit_no
                  description: A unique ID for each unit within a specific crash report.
                - name: unit_type
                  description: The type of unit
                - name: num_passengers
                  description: Number of passengers in the vehicle. The driver is not included. More information on passengers is in the People dataset.
                - name: vehicle_id
                  description: Unique identifier for the vehicle.
                - name: make
                  description: The make (brand) of the vehicle.
                - name: model
                  description: The model of the vehicle.
                - name: lic_plate_state
                  description: The state issuing the vehicle's license plate.
                - name: vehicle_year
                  description: The model year of the vehicle.
                - name: vehicle_defect
                  description: Indicates any vehicle defect reported.
                - name: vehicle_type
                  description: The type of vehicle.
                - name: vehicle_use
                  description: The normal use of the vehicle.
                - name: travel_direction
                  description: Direction the vehicle was traveling prior to the crash.
                - name: maneuver
                  description: The action the vehicle was taking prior to the crash.
                - name: occupant_cnt
                  description: Number of people in the vehicle as determined by the reporting officer.
                - name: area_07_i
                  description: Indicator for damage in vehicle area 07.
                - name: area_08_i
                  description: Indicator for damage in vehicle area 08.
                - name: area_09_i
                  description: Indicator for damage in vehicle area 09.
                - name: area_10_i
                  description: Indicator for damage in vehicle area 10.
                - name: area_11_i
                  description: Indicator for damage in vehicle area 11.
                - name: first_contact_point
                  description: The first point of contact on the vehicle during the crash.
                - name: towed_i
                  description: Indicator whether the vehicle was towed.
                - name: towed_by
                  description: Entity that towed the vehicle.
                - name: towed_to
                  description: Location to which the vehicle was towed.
                - name: area_01_i
                  description: Indicator for damage in vehicle area 01.
                - name: area_02_i
                  description: Indicator for damage in vehicle area 02.
                - name: area_03_i
                  description: Indicator for damage in vehicle area 03.
                - name: area_12_i
                  description: Indicator for damage in vehicle area 12.
                - name: area_06_i
                  description: Indicator for damage in vehicle area 06.
                - name: area_99_i
                  description: Indicator for damage in vehicle area 99.
                - name: area_04_i
                  description: Indicator for damage in vehicle area 04.
                - name: area_05_i
                  description: Indicator for damage in vehicle area 05.
                - name: cmrc_veh_i
                  description: Indicator whether the vehicle is a commercial vehicle.
                - name: area_00_i
                  description: Indicator for damage in vehicle area 00.
                - name: cmv_id
                  description: Identifier for the commercial motor vehicle.
                - name: commercial_src
                  description: Source identifying the commercial vehicle record.
                - name: carrier_name
                  description: Name of the commercial carrier.
                - name: carrier_state
                  description: State where the carrier is registered.
                - name: carrier_city
                  description: City where the carrier is registered.
                - name: hazmat_present_i
                  description: Indicator whether hazardous materials were present.
                - name: hazmat_report_i
                  description: Indicator whether a hazardous materials report was filed.
                - name: mcs_report_i
                  description: Indicator whether a motor carrier safety report was filed.
                - name: hazmat_vio_cause_crash_i
                  description: Indicator whether a hazardous materials violation caused the crash.
                - name: mcs_vio_cause_crash_i
                  description: Indicator whether a motor carrier safety violation caused the crash.
                - name: cargo_body_type
                  description: Type of cargo body carried by the vehicle.
                - name: load_type
                  description: Type of load being transported.
                - name: hazmat_out_of_service_i
                  description: Indicator whether the vehicle was placed out of service due to hazardous materials violations.
                - name: mcs_out_of_service_i
                  description: Indicator whether the vehicle was placed out of service due to motor carrier safety violations.
                - name: gvwr
                  description: Gross Vehicle Weight Rating classification.
                - name: vehicle_config
                  description: Configuration of the vehicle (e.g., tractor-trailer).
                - name: hazmat_class
                  description: Hazardous materials classification.
                - name: usdot_no
                  description: USDOT number assigned to the carrier.
                - name: ccmc_no
                  description: Commercial carrier registration number.
                - name: trailer1_width
                  description: Width of the first trailer.
                - name: axle_cnt
                  description: Number of axles on the vehicle.
                - name: idot_permit_no
                  description: Illinois Department of Transportation permit number.
                - name: trailer2_width
                  description: Width of the second trailer.
                - name: _dlt_load_id
                  description: Internal identifier for the data load batch.
                - name: _dlt_id
                  description: Internal unique identifier for the ingested record.

          - name: external_people
            description: "Raw people data"
            columns:
                - name: person_id
                  description: A unique identifier for each person record. IDs starting with P indicate passengers. IDs starting with O indicate a person who was not a passenger in the vehicle (e.g., driver, pedestrian, cyclist, etc.).
                - name: person_type
                  description: Type of roadway user involved in crash
                - name: crash_record_id
                  description: This number can be used to link to the same crash in the Crashes and Vehicles datasets. This number also serves as a unique ID in the Crashes dataset.
                - name: vehicle_id
                  description: The corresponding CRASH_UNIT_ID from the Vehicles dataset.
                - name: crash_date
                  description: Date and time of crash as entered by the reporting officer
                - name: seat_no
                  description: Code for seating position of motor vehicle occupant. 1= driver, 2= center front, 3 = front passenger, 4 = second row left, 5 = second row center, 6 = second row right, 7 = enclosed passengers, 8 = exposed passengers, 9= unknown position, 10 = third row left, 11 = third row center, 12 = third row right
                - name: city
                  description: City of residence of person involved in crash
                - name: state
                  description: State of residence of person involved in crash
                - name: zipcode
                  description: Zip code of residence of person involved in crash
                - name: sex
                  description: Gender of person involved in crash, as determined by reporting officer
                - name: age
                  description: Age of person involved in crash
                - name: drivers_license_state
                  description: State issuing driver's license of person involved in crash
                - name: drivers_license_class
                  description: Driver's license class of person involved in crash
                - name: safety_equipment
                  description: Safety equipment used by vehicle occupant in crash, if any
                - name: airbag_deployed
                  description: Whether vehicle occupant airbag deployed as result of crash
                - name: ejection
                  description: Whether vehicle occupant was ejected or extricated from the vehicle as a result of crash
                - name: injury_classification
                  description: Severity of injury person sustained in the crash
                - name: hospital
                  description: Hospital to which person injured in the crash was taken
                - name: ems_agency
                  description: EMS agency who transported person injured in crash to the hospital
                - name: ems_run_no
                  description: EMS agency run number
                - name: driver_action
                  description: Driver action that contributed to the crash, as determined by reporting officer
                - name: driver_vision
                  description: What, if any, objects obscured the driver’s vision at time of crash
                - name: physical_condition
                  description: Driver’s apparent physical condition at time of crash, as observed by the reporting officer
                - name: pedpedal_action
                  description: Action of pedestrian or cyclist at the time of crash
                - name: pedpedal_visibility
                  description: Visibility of pedestrian of cyclist safety equipment in use at time of crash
                - name: pedpedal_location
                  description: Location of pedestrian or cyclist at time of crash
                - name: bac_result
                  description: Status of blood alcohol concentration testing for driver or other person involved in crash
                - name: bac_result_value
                  description: Driver’s blood alcohol concentration test result (fatal crashes may include pedestrian or cyclist results)
                - name: cell_phone_use
                  description: Whether person was/was not using cellphone at the time of the crash, as determined by the reporting officer
                - name: _dlt_load_id
                  description: Internal identifier for the data load batch.
                - name: _dlt_id
                  description: Internal unique identifier for the ingested record.
